services:
  postgres:
    image: postgres:16-alpine
    container_name: learn-flow-edu-service-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learn-flow-edu-service-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    image: migrate/migrate:latest
    container_name: learn-flow-edu-service-migrations
    volumes:
      - ./migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=${DB_SSLMODE}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learn-flow-edu-service-network
    restart: "no"

  app:
    build: .
    container_name: learn-flow-edu-service-app
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    environment:
      APP_ENV: ${APP_ENV}
      HTTP_PORT: ${HTTP_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_TIMEZONE: ${DB_TIMEZONE}
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - learn-flow-edu-service-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: learn-flow-edu-service-data

networks:
  learn-flow-edu-service-network:
    name: learn-flow-edu-service-network
    driver: bridge
